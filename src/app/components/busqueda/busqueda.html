<h1>Búsqueda: <small>"{{termino}}" </small></h1>
<br>

<div class="row" *ngIf="heroes.length == 0">
    <div class="col-md-12">
        <div class="alert alert-info" role="alert">
            No existen resultados con el término: <strong>{{termino}}</strong>
        </div>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">

    <app-heroe-tarjeta [heroe]="heroe" [index]="i" *ngFor="let heroe of heroes; let i = index"> 

    </app-heroe-tarjeta>
    
</div>
