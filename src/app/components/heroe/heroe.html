<h1>{{heroe.nombre | uppercase}}</h1><small>Primera Aparición: {{heroe.aparicion | date: 'yyyy'}} </small>
<br>
<div class="row">
    <div class="col-md-4">
        <img src="{{heroe.img}}" alt="{{heroe.nombre}}" class="img-fluid">
        <br><br>
        <a routerLink="/heroes" class="btn btn-outline-danger btn-block">Regresar</a>
    </div>
    <div class="col-md-8">
        <h3>{{heroe.nombre}}</h3>
        <hr>
        <p>{{heroe.bio}}</p>
        <div>
            <img *ngIf="heroe.casa == 'DC'" src="images/dc.jpg" alt="{{heroe.nombre}}" class="img-logo">
            <img *ngIf="heroe.casa == 'Marvel'" src="images/marvel.png" alt="{{heroe.nombre}}" class="img-logo" >
        </div>
    </div>
</div>
